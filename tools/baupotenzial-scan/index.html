<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Baupotenzial-Scan | Eigentümer-Check</title>
  <meta name="description" content="Lade Parzellenangaben hoch und erhalte innert 10 Tagen ein Verdichtungs-Dossier mit Zonenplan, Mehrwertabgabe und Partnerempfehlungen.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    body{margin:0;font-family:'Inter',sans-serif;background:#F4F7FB;color:#0B1D2B;line-height:1.7;}
    header{background:#0B1D2B;color:white;padding:48px 24px;text-align:center;}
    main{max-width:780px;margin:0 auto;padding:40px 24px 80px;display:grid;gap:32px;}
    section{background:white;border-radius:20px;padding:32px;box-shadow:0 18px 45px rgba(11,29,43,0.12);}
    label{font-weight:600;}
    input, textarea{width:100%;padding:12px 14px;border-radius:10px;border:1px solid #D0D5DD;font-size:1rem;}
    button{border:none;background:#0D7FD8;color:white;padding:14px 18px;border-radius:999px;font-weight:600;cursor:pointer;}
  </style>
</head>
<body>
  <header>
    <h1>Baupotenzial-Scan</h1>
    <p>Analyse von Zonenplan, Mehrwertabgabe und Rendite – Ergebnis innert 10 Arbeitstagen.</p>
  </header>
  <main>
    <section>
      <h2>Was wir liefern</h2>
      <ul>
        <li>Volumenstudie & Ausnützungsziffer</li>
        <li>Mehrwertabgabe- und Investitionsplan</li>
        <li>Partnerempfehlungen (Architekt, TU, Käufer)</li>
      </ul>
    </section>
    <section>
      <h2>Case Submission</h2>
      <form action="mailto:kontakt@eigentumer-check.ch" method="post" enctype="text/plain" style="display:grid;gap:16px;">
        <input type="text" name="name" placeholder="Vor- und Nachname" required>
        <input type="email" name="email" placeholder="E-Mail" required>
        <input type="text" name="parzelle" placeholder="Parzelle / Adresse" required>
        <textarea name="info" rows="4" placeholder="Kurzbeschreibung (z.B. gewünschte Nutzung, geplante Wohnfläche)"></textarea>
        <button type="submit">Upload-Link anfordern</button>
      </form>
    </section>
  </main>
</body>
</html>
